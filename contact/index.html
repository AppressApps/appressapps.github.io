<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Appress</title>
    <style>
        :root {
            --primary-color: #128660;
            --text-dark: #333;
            --text-light: #666;
            --bg-light: #f8f9fa;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.8;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px 20px;
            background: var(--white);
            flex: 1;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-align: center;
        }

        .contact-info {
            margin-top: 40px;
            text-align: center;
        }

        .contact-item {
            margin-bottom: 25px;
        }

        .contact-label {
            display: block;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .contact-value {
            font-size: 1.2rem;
            color: var(--primary-color);
            text-decoration: none;
        }

        .contact-value:hover {
            text-decoration: underline;
        }

        p {
            margin-bottom: 20px;
            color: var(--text-light);
            font-size: 1.1rem;
            text-align: center;
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #999;
            background: var(--white);
            border-top: 1px solid #eee;
        }

        a.back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-light);
            text-decoration: none;
        }

        a.back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>If you have any questions, suggestions, or feedback regarding our applications, please feel free to reach out to us. We value your input and are here to help.</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <span class="contact-label">Email Support:</span>
                <a href="mailto:appressllc@gmail.com" class="contact-value">appressllc@gmail.com</a>
            </div>
            
            <div class="contact-item">
                <span class="contact-label">Developer:</span>
                <span class="contact-value" style="color: var(--text-dark);">Appress Group</span>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <footer>
        <p>© 2026 Appress Apps. All rights reserved.</p>
    </footer>
</body>
</html>
